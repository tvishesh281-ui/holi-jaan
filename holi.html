<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi - Love Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            color: white;
            text-shadow: 3px 3px 0 #ff6b6b, 6px 6px 0 #feca57;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .love-message {
            font-size: 1.5rem;
            color: white;
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        .couple {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .heart {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ff4757;
            transform: rotate(45deg);
            animation: heartbeat 1.2s ease infinite;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ff4757;
            border-radius: 50%;
        }

        .heart::before {
            top: -40px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: -40px;
        }

        .heart-left {
            left: 20px;
            top: 30px;
            background: #ff6b81;
            animation-delay: 0.2s;
        }

        .heart-right {
            right: 20px;
            top: 30px;
            background: #ff4757;
            animation-delay: 0.4s;
        }

        @keyframes heartbeat {
            0%, 100% { transform: rotate(45deg) scale(1); }
            50% { transform: rotate(45deg) scale(1.1); }
        }

        .color-balls {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .ball {
            position: absolute;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0.5;
            }
        }

        .splash {
            position: absolute;
            border-radius: 50%;
            animation: splashAnim 2s ease-out infinite;
        }

        @keyframes splashAnim {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        .btn {
            background: white;
            color: #ff4757;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .name {
            font-size: 2rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="color-balls" id="colorBalls"></div>
    
    <div class="container">
        <h1>🎨 Happy Holi 🎨</h1>
        
        <div class="couple">
            <div class="heart heart-left"></div>
            <div class="heart heart-right"></div>
        </div>
        
        <div class="name">Vishesh ❤️ Manshi</div>
        
        <div class="love-message">
            "Tumhare bina Holi adhi hai,<br>
            Tumhare saath poori hai!" 💕
        </div>
        
        <button class="btn" onclick="makeColors()">
            🎉 Colors Bhadkao! 🎉
        </button>
    </div>

    <script>
        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#ff4757', '#2ed573'];
        
        function createColorBall() {
            const ball = document.createElement('div');
            ball.className = 'ball';
            
            const size = Math.random() * 30 + 10;
            ball.style.width = size + 'px';
            ball.style.height = size + 'px';
            ball.style.background = colors[Math.floor(Math.random() * colors.length)];
            ball.style.left = Math.random() * 100 + 'vw';
            ball.style.animationDuration = (Math.random() * 3 + 2) + 's';
            ball.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            
            document.getElementById('colorBalls').appendChild(ball);
            
            setTimeout(() => {
                ball.remove();
            }, 5000);
        }

        function makeColors() {
            for(let i = 0; i < 50; i++) {
                setTimeout(createColorBall, i * 50);
            }
        }

        // Auto create colors
        setInterval(createColorBall, 500);

        // Add splash effect on click
        document.addEventListener('click', function(e) {
            const splash = document.createElement('div');
            splash.className = 'splash';
            splash.style.left = e.clientX + 'px';
            splash.style.top = e.clientY + 'px';
            splash.style.width = '50px';
            splash.style.height = '50px';
            splash.style.background = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(splash);
            
            setTimeout(() => splash.remove(), 2000);
        });
    </script>
</body>
</html>
